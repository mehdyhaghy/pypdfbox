[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "pypdfbox"
version = "0.0.1"
description = "Python-native port of Apache PDFBox-compatible APIs (Apache 2.0)"
readme = "README.md"
requires-python = ">=3.14"
license = { file = "LICENSE" }
authors = [{ name = "pypdfbox contributors" }]
keywords = ["pdf", "pdfbox", "accessibility", "tagged-pdf", "pdf-a"]
classifiers = [
    "Development Status :: 1 - Planning",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Text Processing :: Markup",
]

# PRD §4 + §3.7.1: runtime deps require explicit user approval per the
# library catalog. Currently approved: none (cryptography will be added
# when encryption/signature clusters land). Font handling is ported from
# org.apache.fontbox.* directly — no fonttools dep.
dependencies = []

[project.urls]
Homepage = "https://github.com/mehdyhaghy/pypdfbox"
Repository = "https://github.com/mehdyhaghy/pypdfbox"

# PEP 735 dependency groups — uv-native, replaces optional-dependencies for dev tooling.
[dependency-groups]
dev = [
    "pytest>=8",          # MIT
    "pytest-cov>=5",      # MIT
    "ruff>=0.5",          # MIT
    "mypy>=1.10",         # MIT
]

[tool.hatch.build.targets.wheel]
packages = ["pypdfbox"]

[tool.uv]
package = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
# UP012: prefer explicit encoding="utf-8" / "utf-8" on encode/decode/open
# for readability and defensiveness, even though Python 3 hard-codes UTF-8
# as the str.encode default. Project preference.
ignore = ["UP012"]

[tool.mypy]
python_version = "3.14"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
