name: Release

# Release workflow. Triggers on a v* tag, builds a wheel + sdist via uv,
# rehearses the upload on TestPyPI, then publishes to production PyPI.
# Both publish jobs use PyPA trusted publishing (OIDC) — each needs its
# trusted publisher registered on the respective index (environment
# "testpypi" on test.pypi.org, environment "pypi" on pypi.org).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build wheel + sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypdfbox-dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted publishing requires the id-token permission.
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pypdfbox
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypdfbox-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/pypdfbox
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypdfbox-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
