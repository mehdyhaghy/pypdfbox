name: License Check

# Apache-2.0 / MIT / BSD-only policy per PRD §4. Hard-fails CI if any
# transitive dependency reports a license outside the allow-list. Runs on
# every PR and nightly so license drift in a transitive dep can't sneak in
# between releases.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly at 06:17 UTC — off-peak, no overlap with hourly cron herds.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  licenses:
    name: dep-license allow-list
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync runtime dependencies
        run: uv sync --no-dev

      - name: Install pip-licenses
        # pip-licenses itself is MIT-licensed.
        run: uv pip install pip-licenses

      # Allow-list mirrors CLAUDE.md "Apache-2.0 / MIT / BSD only" with the
      # PSF additions needed for stdlib-derived deps (no-op today, future-
      # proofs against typing_extensions etc.). MPL-2.0 is permitted per
      # PRD §4 dependency catalog (weak copyleft, file-scope; safe to wrap).
      #
      # "Python (MIT style)" — non-standard PyPI metadata string reported by
      # aggdraw 1.4.1. Its actual LICENSE.txt is HPND-equivalent permissive
      # ("Permission to use, copy, modify, and distribute ... provided that
      # the above copyright notice appears in all copies"). Verified manually.
      #
      # "MIT-CMU" — SPDX identifier for the CMU License, reported by
      # Pillow 12.x. Same wording as aggdraw above (descended from the
      # original PIL/HPND license) — permissive. Verified manually.
      #
      # "Apache-2.0" / "Apache-2.0 OR BSD-2-Clause" / "Apache-2.0 OR
      # BSD-3-Clause" — SPDX identifiers used by newer PyPI metadata
      # (packaging 26.x → Apache-2.0 OR BSD-2-Clause; cryptography 47.x
      # → Apache-2.0 OR BSD-3-Clause). Both halves of every OR are
      # already in the allow-list under their classifier forms; adding
      # the SPDX expression as a literal so pip-licenses' exact-match
      # passes without a license shim.
      #
      # "PSF-2.0" — SPDX identifier for the Python Software Foundation
      # License v2 (reported by typing_extensions 4.x); equivalent to
      # the older "Python Software Foundation License" classifier form
      # already on the list.
      - name: Render dependency licenses
        run: uv run pip-licenses --format=csv --with-license-file --with-urls

      - name: Enforce allow-list
        run: |
          uv run pip-licenses \
            --format=csv \
            --allow-only "Apache Software License;Apache License 2.0;MIT License;MIT;BSD License;3-Clause BSD License;BSD-3-Clause;BSD-2-Clause;Python Software Foundation License;Mozilla Public License 2.0 (MPL 2.0);ISC License;ISC License (ISCL);Historical Permission Notice and Disclaimer (HPND);Python (MIT style);MIT-CMU;Apache-2.0;Apache-2.0 OR BSD-2-Clause;Apache-2.0 OR BSD-3-Clause;PSF-2.0"
