name: Verify Windows x64

# Manual, on-demand only — NOT a CI gate. Installs the published TestPyPI
# build on a real windows-latest (x64) runner and runs a core+render smoke
# test to validate the win_amd64 wheel set. Safe to delete after use.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    name: smoke test on windows-latest (x64)
    runs-on: windows-latest
    steps:
      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Show interpreter
        run: python -c "import platform,sys; print('machine', platform.machine(), platform.architecture(), sys.version)"

      - name: Install pypdfbox from TestPyPI
        run: python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ pypdfbox

      - name: Installed wheels
        run: python -m pip list

      - name: Smoke test (create / save / load / extract / render)
        run: |
          python - <<'PY'
          from pypdfbox.pdmodel import PDDocument, PDPage
          from pypdfbox.pdmodel.pd_page_content_stream import PDPageContentStream
          from pypdfbox.examples.pdmodel._font_helpers import make_standard14_type1_font as mk
          from pypdfbox.pdmodel.font.standard14_fonts import FontName as F
          from pypdfbox.text import PDFTextStripper
          from pypdfbox.rendering import PDFRenderer

          d = PDDocument(); p = PDPage(); d.add_page(p)
          cs = PDPageContentStream(d, p)
          cs.begin_text(); cs.set_font(mk(F.HELVETICA), 24)
          cs.new_line_at_offset(72, 700); cs.show_text("win x64 ok"); cs.end_text(); cs.close()
          d.save("t.pdf"); d.close()
          with PDDocument.load("t.pdf") as doc:
              txt = PDFTextStripper().get_text(doc).strip()
              assert txt == "win x64 ok", repr(txt)
              print("TEXT:", repr(txt))
          with PDDocument.load("t.pdf") as doc:
              sz = PDFRenderer(doc).render_image_with_dpi(0, 96).size
              assert sz == (816, 1056), sz
              print("RENDER:", sz)
          print("WINDOWS x64: ALL OK")
          PY
