name: CI

# Wave 1304 — RC gate: pytest + ruff on every push/PR, on the platforms our
# users actually deploy on. Matches the matrix called out in the wave-1301
# path-to-release plan.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml pins requires-python = ">=3.14"; keep CI aligned.
        python-version: ["3.14"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # qpdf is a *system* package; tests skip when absent (see
      # scripts/qpdf_check.py + tests/integration/test_qpdf_validation.py).
      - name: Install qpdf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Install qpdf (macOS)
        if: runner.os == 'macOS'
        run: brew install qpdf

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Test (pytest)
        env:
          # Ubuntu CI runners are headless — no $DISPLAY available. Skip Tk
          # widget tests there rather than installing Xvfb just for them.
          # macOS + Windows runners both have a display by default and run
          # the Tk tests normally.
          PYPDFBOX_SKIP_TK: ${{ runner.os == 'Linux' && '1' || '' }}
        run: uv run pytest -q --tb=short --maxfail=10
